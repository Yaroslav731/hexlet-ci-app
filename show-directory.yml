name: Hexlet CI

# Указываем, когда запускать workflow: при пуше в ветку или создании Pull Request
on:
  - push
  - pull_request

jobs:
  build:
    # Запускаем на свежей ОС Ubuntu
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория на виртуальную машину
      - uses: actions/checkout@v4

      # 2. Настраиваем окружение Node.js (так как проект на JS/Node)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Устанавливаем зависимости с помощью вашей make-команды
      - name: Install dependencies
        run: make setup

      # 4. Запускаем линтер для проверки стиля кода
      - name: Run linter
        run: make lint

      # 5. Запускаем тесты
      - name: Run tests
        run: make test
